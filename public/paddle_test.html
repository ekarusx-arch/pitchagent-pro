<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <style>body { font-family: sans-serif; padding: 20px; }</style>
</head>
<body>
    <h2>Paddle Sandbox Test</h2>
    <div id="status">Loading...</div>
    <button onclick="openCheckout()" id="btn" disabled>Open Checkout</button>
    <script>
        const PADDLE_TOKEN = "test_36875e8aee31d15d9258ad340b5"; // Correct sandbox token
        
        Paddle.Environment.set("sandbox");
        Paddle.Initialize({
            token: PADDLE_TOKEN,
            eventCallback: function(data) {
                console.log("Event:", data.name, data);
            }
        });

        document.getElementById("status").innerText = "Initialized (sandbox)";
        document.getElementById("btn").disabled = false;

        function openCheckout() {
            try {
                Paddle.Checkout.open({
                    items: [
                        { priceId: 'pri_01kjrq28anzaxrp4acjs4f3qdp', quantity: 1 }
                    ],
                    customData: {
                        userId: 'test_user123',
                        planName: 'Pro Agent',
                        credits: '0'
                    },
                    customer: {
                        email: 'test@example.com'
                    },
                    settings: {
                        displayMode: 'overlay',
                        theme: 'dark'
                    }
                });
            } catch(e) {
                alert(e.message);
            }
        }
    </script>
</body>
</html>
